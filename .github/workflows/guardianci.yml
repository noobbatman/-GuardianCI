name: GuardianCI

on:
  pull_request:
    branches:
      - main

# Default: deny everything. Each job declares only what it needs.
permissions: {}

jobs:
  ai-review:
    name: AI security review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install AI review dependencies
        run: uv pip install --system google-genai requests

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Secret pre-scan (gitleaks)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --no-tags
          gitleaks detect --source . \
            --log-opts "origin/${{ github.base_ref }}..HEAD" \
            --no-banner \
            --exit-code 0 \
            --report-format json \
            --report-path gitleaks-report.json 2>&1 || true
          if [ -s gitleaks-report.json ]; then
            COUNT=$(python3 -c "
          import json, sys
          data = json.load(open('gitleaks-report.json'))
          print(len(data) if isinstance(data, list) else 0)
          " 2>/dev/null || echo "some")
            echo "::warning::Gitleaks found ${COUNT} potential secret(s) in this PR — Gemini review will also report these as CRITICAL findings"
            cat gitleaks-report.json
          fi

      - name: Run Gemini security review
        id: ai-review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          GUARDIANCI_GEMINI_ENABLED: ${{ vars.GUARDIANCI_GEMINI_ENABLED || 'true' }}
          GUARDIANCI_AUTOFIX_ENABLED: "false"
          GUARDIANCI_REVIEW_RESULT_PATH: guardianci-review-result.json
        run: python scripts/guardianci_ai_review.py --review-only

      - name: Upload GuardianCI review result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guardianci-review-result
          path: guardianci-review-result.json
          if-no-files-found: warn

  metrics:
    name: Security metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ai-review
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download GuardianCI review result
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: guardianci-review-result
          path: .

      - name: Publish GuardianCI metrics
        # guardianci_metrics.py uses only the standard library; no pip install needed.
        run: python scripts/guardianci_metrics.py --result guardianci-review-result.json

  auto-fix:
    name: Auto-fix draft PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ai-review
    if: ${{ always() && github.event_name == 'pull_request' && (vars.GUARDIANCI_AUTOFIX_ENABLED || 'true') == 'true' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install AI review dependencies
        run: uv pip install --system google-genai requests

      - name: Prepare GuardianCI auto-fix draft PR
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          GUARDIANCI_GEMINI_ENABLED: ${{ vars.GUARDIANCI_GEMINI_ENABLED || 'true' }}
          GUARDIANCI_AUTOFIX_ENABLED: ${{ vars.GUARDIANCI_AUTOFIX_ENABLED || 'true' }}
        run: python scripts/guardianci_ai_review.py --auto-fix-only

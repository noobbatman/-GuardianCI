name: GuardianCI

on:
  pull_request:
    branches:
      - main

# Default: deny everything. Each job declares only what it needs.
permissions: {}

jobs:
  ai-review:
    name: AI security review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements/base.lock

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Secret pre-scan (gitleaks)
        if: github.event_name == 'pull_request'
        env:
          GUARDIANCI_AI_ENABLED: ${{ vars.GUARDIANCI_AI_ENABLED || vars.GUARDIANCI_GEMINI_ENABLED || 'true' }}
        run: |
          git fetch origin ${{ github.base_ref }} --no-tags
          gitleaks detect --source . \
            --log-opts "origin/${{ github.base_ref }}..HEAD" \
            --no-banner \
            --exit-code 0 \
            --report-format json \
            --report-path gitleaks-report.json 2>&1 || true
          if [ -s gitleaks-report.json ]; then
            COUNT=$(python3 -c "
          import json, sys
          data = json.load(open('gitleaks-report.json'))
          print(len(data) if isinstance(data, list) else 0)
          " 2>/dev/null || echo "some")
            if [ "${GUARDIANCI_AI_ENABLED}" = "false" ]; then
              # AI review disabled — gitleaks is the only enforcement layer; fail the job.
              echo "::error::Gitleaks found ${COUNT} secret(s). AI review is disabled, so gitleaks is the only enforcement layer. Fix secrets before merging."
              cat gitleaks-report.json
              exit 1
            else
              echo "::warning::Gitleaks found ${COUNT} potential secret(s) in this PR — AI review will also report these as CRITICAL findings"
              cat gitleaks-report.json
            fi
          fi

      - name: Run GuardianCI AI security review
        id: ai-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIANCI_REVIEW_RESULT_PATH: guardianci-review-result.json
          GUARDIANCI_AUTOFIX_ENABLED: "false"
          # ── LLM provider (choose one) ───────────────────────────────────────────
          # Gemini (default): set GUARDIANCI_LLM_PROVIDER=gemini and supply GEMINI_API_KEY
          GUARDIANCI_LLM_PROVIDER: ${{ vars.GUARDIANCI_LLM_PROVIDER || 'gemini' }}
          GUARDIANCI_LLM_MODEL: ${{ vars.GUARDIANCI_LLM_MODEL || vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          GUARDIANCI_LLM_API_KEY: ${{ secrets.GUARDIANCI_LLM_API_KEY || secrets.GEMINI_API_KEY }}
          # OpenAI / Azure / Groq / Mistral / Ollama: set GUARDIANCI_LLM_PROVIDER=openai
          #   and GUARDIANCI_LLM_BASE_URL (omit for api.openai.com)
          GUARDIANCI_LLM_BASE_URL: ${{ vars.GUARDIANCI_LLM_BASE_URL || '' }}
          # Anthropic: set GUARDIANCI_LLM_PROVIDER=anthropic
          # ── Enable/disable the LLM call ────────────────────────────────────────
          GUARDIANCI_AI_ENABLED: ${{ vars.GUARDIANCI_AI_ENABLED || vars.GUARDIANCI_GEMINI_ENABLED || 'true' }}
          # Legacy back-compat: still accepted if GEMINI_API_KEY is the only secret set
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/guardianci_ai_review.py --review-only

      - name: Upload GuardianCI review result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: guardianci-review-result
          path: guardianci-review-result.json
          if-no-files-found: warn

  metrics:
    name: Security metrics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ai-review
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Download GuardianCI review result
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        continue-on-error: true
        with:
          name: guardianci-review-result
          path: .

      - name: Publish GuardianCI metrics
        # guardianci_metrics.py uses only the standard library; no pip install needed.
        env:
          # Optional: set GUARDIANCI_METRICS_WEBHOOK_URL to push every review result
          # to Datadog, Grafana, Splunk, a custom API, or any HTTP endpoint.
          # Set GUARDIANCI_METRICS_WEBHOOK_SECRET to sign payloads with HMAC-SHA256.
          GUARDIANCI_METRICS_WEBHOOK_URL: ${{ secrets.GUARDIANCI_METRICS_WEBHOOK_URL }}
          GUARDIANCI_METRICS_WEBHOOK_SECRET: ${{ secrets.GUARDIANCI_METRICS_WEBHOOK_SECRET }}
        run: python scripts/guardianci_metrics.py --result guardianci-review-result.json

  auto-fix:
    name: Auto-fix draft PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - ai-review
    if: ${{ always() && github.event_name == 'pull_request' && (vars.GUARDIANCI_AUTOFIX_ENABLED || 'true') == 'true' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements/base.lock

      - name: Prepare GuardianCI auto-fix draft PR
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          GUARDIANCI_GEMINI_ENABLED: ${{ vars.GUARDIANCI_GEMINI_ENABLED || 'true' }}
          GUARDIANCI_AUTOFIX_ENABLED: ${{ vars.GUARDIANCI_AUTOFIX_ENABLED || 'true' }}
        run: python scripts/guardianci_ai_review.py --auto-fix-only

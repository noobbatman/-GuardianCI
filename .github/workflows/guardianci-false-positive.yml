name: GuardianCI False Positive Feedback

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions: {}

jobs:
  record-false-positive:
    name: Record /fp feedback
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request &&
            (
              startsWith(github.event.comment.body, '/fp') ||
              startsWith(github.event.comment.body, '/FP') ||
              startsWith(github.event.comment.body, '/Fp') ||
              startsWith(github.event.comment.body, '/fP')
            )
          ) ||
          (
            github.event_name == 'pull_request_review_comment' &&
            (
              startsWith(github.event.comment.body, '/fp') ||
              startsWith(github.event.comment.body, '/FP') ||
              startsWith(github.event.comment.body, '/Fp') ||
              startsWith(github.event.comment.body, '/fP')
            )
          )
        )
      }}
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install feedback dependencies
        run: python -m pip install requests

      - name: Record GuardianCI false-positive exclusion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIANCI_METRICS_BRANCH: guardianci-metrics
        run: python scripts/guardianci_false_positive.py

  monthly-audit:
    name: Monthly false-positive audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install feedback dependencies
        run: python -m pip install requests

      - name: Post GuardianCI exclusions audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIANCI_METRICS_BRANCH: guardianci-metrics
          GUARDIANCI_EXCLUSIONS_AUDIT_ISSUE: ${{ vars.GUARDIANCI_EXCLUSIONS_AUDIT_ISSUE }}
        run: python scripts/guardianci_false_positive.py --audit

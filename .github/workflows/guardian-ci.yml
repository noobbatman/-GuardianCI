name: GuardianCI Phase 1

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_FAIL_UNDER: "80"
  DOCKER_IMAGE_NAME: guardianci-smoke
  HEALTHCHECK_URL: http://localhost:8000/health
  INTEGRATION_TEST_PATH: tests/integration

jobs:
  test:
    name: Unit tests and coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          fi

      - name: Verify test suite exists
        run: |
          if [ ! -d tests ]; then
            echo "Phase 1 requires a tests/ directory with a pytest suite."
            exit 1
          fi

      - name: Run pytest with coverage gate
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${COVERAGE_FAIL_UNDER}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  docker-smoke:
    name: Docker smoke and integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Docker assets exist
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Phase 1 requires a Dockerfile."
            exit 1
          fi

          if [ -f compose.yml ]; then
            echo "COMPOSE_FILE=compose.yml" >> "$GITHUB_ENV"
          elif [ -f compose.yaml ]; then
            echo "COMPOSE_FILE=compose.yaml" >> "$GITHUB_ENV"
          elif [ -f docker-compose.yml ]; then
            echo "COMPOSE_FILE=docker-compose.yml" >> "$GITHUB_ENV"
          elif [ -f docker-compose.yaml ]; then
            echo "COMPOSE_FILE=docker-compose.yaml" >> "$GITHUB_ENV"
          else
            echo "Phase 1 requires a compose.yml, compose.yaml, docker-compose.yml, or docker-compose.yaml file."
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build -t "${DOCKER_IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Start Docker Compose stack
        run: |
          docker compose -f "${COMPOSE_FILE}" up -d --build

      - name: Wait for health check
        run: |
          for attempt in {1..30}; do
            status_code="$(curl -s -o /tmp/health.out -w "%{http_code}" "${HEALTHCHECK_URL}" || true)"

            if [ "$status_code" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi

            echo "Health check attempt ${attempt} returned ${status_code}; retrying..."
            sleep 2
          done

          echo "Health check never returned 200 from ${HEALTHCHECK_URL}."
          cat /tmp/health.out || true
          exit 1

      - name: Set up Python for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          fi

      - name: Run integration tests against live container
        run: |
          if [ ! -d "${INTEGRATION_TEST_PATH}" ]; then
            echo "Phase 1 requires integration tests at ${INTEGRATION_TEST_PATH}."
            exit 1
          fi

          pytest "${INTEGRATION_TEST_PATH}"

      - name: Print container logs on failure
        if: failure()
        run: |
          docker compose -f "${COMPOSE_FILE}" logs

      - name: Stop Docker Compose stack
        if: always()
        run: |
          docker compose -f "${COMPOSE_FILE}" down --volumes --remove-orphans

  ai-review:
    name: AI review stub
    runs-on: ubuntu-latest

    steps:
      - name: No-op until Phase 2
        run: |
          echo "GuardianCI AI review is intentionally stubbed in Phase 1."

  deploy:
    name: Deploy gate placeholder
    runs-on: ubuntu-latest
    needs:
      - test
      - docker-smoke
      - ai-review
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Confirm Phase 1 gate
        run: |
          echo "All Phase 1 jobs passed on main. Real deployment is added in Phase 7."

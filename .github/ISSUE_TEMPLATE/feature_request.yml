name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check [Discussions](https://github.com/noobbatman/-GuardianCI/discussions)
        and open issues to see if it has already been proposed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or limitation you are running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like GuardianCI to do differently?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you have thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - LLM provider support
        - VCS platform support (GitHub / GitLab)
        - Detection patterns / local scan
        - Metrics / webhook
        - CI workflow / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to implement?
      options:
        - label: I am interested in submitting a PR for this feature.
